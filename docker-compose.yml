version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  acc:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/acc
      REDIS_URL: redis://redis:6379
      API_KEY: change-me

volumes:
  postgres-data:
